<!-- ANNEXURE VII -->
<div id="view-anx7" class="view">
  <div class="header-row">
    <div>
      <div class="page-title">Annexure VII - Transportation Routes</div>
      <div class="page-sub">Transportation routes for individual leases and leases in clusters</div>
    </div>
    <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
      <span id="anx7-uploaded-filename"
        style="font-size:12px; color:var(--text-soft); font-weight:600; display:none; padding:4px 8px; background:var(--off); border-radius:var(--r-xs); border:1px solid var(--border);"></span>
      <button id="anx7-preview-btn" class="btn btn-outline btn-sm" style="display:none; align-items:center; gap:6px;"
        onclick="togglePDFPreviewAnx7()"><i data-lucide="eye" style="width:14px; height:14px;"></i> Preview PDF</button>
      <button id="anx7-download-btn" class="btn btn-pdf-download btn-sm" style="display:none;"
        onclick="downloadPdfAnx7()"><i data-lucide="download" style="width:14px; height:14px;"></i> Download
        PDF</button>
      <button id="anx7-delete-btn" class="btn btn-danger btn-sm" style="display:none; align-items:center; gap:6px;"
        onclick="deletePdfAnx7()"><i data-lucide="trash-2" style="width:14px; height:14px;"></i> Delete PDF</button>
      <label class="btn btn-pdf-upload btn-sm"
        style="cursor:pointer; margin-bottom:0; display:inline-flex; align-items:center; gap:6px;">
        <i data-lucide="upload" style="width:14px; height:14px;"></i>
        <span>Upload PDF</span>
        <input type="file" accept="application/pdf" id="anx7-pdf-input" hidden onchange="handlePDFUploadAnx7(event)">
      </label>
    </div>
  </div>

  <div id="pdf-preview-section-anx7" class="card" style="display: none; border-color: #0ea5e9; margin-bottom: 24px;">
    <div class="card-bd">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3 style="margin: 0; font-size: 18px; color: #0369a1;">Uploaded PDF Preview</h3>
        <button class="btn btn-sm btn-danger" onclick="closePDFPreviewAnx7()"
          style="display:inline-flex; align-items:center; gap:6px;">
          <i data-lucide="x" style="width:14px; height:14px;"></i>
          <span>Close Preview</span>
        </button>
      </div>
      <iframe src="about:blank" id="pdf-iframe-anx7"
        style="width: 100%; height: 600px; border: 1px solid #e5e7eb; border-radius: 6px; background: #f9fafb;"></iframe>
    </div>
  </div>

  <div id="anx7-individual-routes-container">
    <!-- table blocks injected dynamically -->
  </div>
  <div style="margin-bottom:30px; margin-top:12px;">
    <button class="btn btn-sm btn-pdf-upload" onclick="addRouteTableBlockAnx7()"
      style="display:inline-flex; align-items:center; gap:6px;">
      <i data-lucide="plus-circle" style="width:14px; height:14px;"></i>
      <span>Add Another Table / Section</span>
    </button>
  </div>

  <div id="anx7-cluster-routes-container">
    <!-- table blocks injected dynamically -->
  </div>
  <div style="margin-bottom:30px; margin-top:12px;">
    <button class="btn btn-sm btn-pdf-upload" onclick="addClusterTableBlockAnx7()"
      style="display:inline-flex; align-items:center; gap:6px;">
      <i data-lucide="plus-circle" style="width:14px; height:14px;"></i>
      <span>Add Another Table / Section</span>
    </button>
  </div>

  <div class="final-actions" style="margin-top:32px; display:flex; justify-content:center;">
    <button class="btn btn-pdf-upload btn-lg" onclick="exportAnx7PDF()"
      style="display:inline-flex; align-items:center; gap:8px;">
      <i data-lucide="file-text" style="width:18px; height:18px;"></i>
      <span>Download Final Annexure 7 PDF</span>
    </button>
  </div>
</div>
