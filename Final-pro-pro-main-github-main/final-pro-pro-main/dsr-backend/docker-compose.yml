version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: dsr-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dsr_db
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # pgAdmin (Database UI Visualizer)
  pgadmin:
    image: dpage/pgadmin4
    container_name: dsr-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dsr.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5055:80"
    depends_on:
      - postgres
    restart: unless-stopped

  # Redis for Caching
  redis:
    image: redis:7
    container_name: dsr-redis
    ports:
      - "6380:6379"
    restart: unless-stopped

  # MinIO for Document Storage
  minio:
    image: minio/minio
    container_name: dsr-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9011"
    ports:
      - "9010:9000"
      - "9011:9011"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
